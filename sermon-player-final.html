<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>말씀 듣기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --accent: #7c9ef5;
    --accent-dim: rgba(124,158,245,0.15);
    --text: #e8eaf0;
    --text-muted: #7a7f96;
    --border: rgba(255,255,255,0.07);
    --danger: #e05c5c;
    --radius: 14px;
    --font: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 12px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
  .logo span { color: var(--accent); }
  .btn-manage {
    background: var(--accent-dim); border: 1px solid rgba(124,158,245,0.3);
    color: var(--accent); font-size: 12px; font-weight: 500; font-family: var(--font);
    padding: 6px 12px; border-radius: 20px; cursor: pointer;
  }

  /* ── Search bar ── */
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 40px 10px 14px;
    color: var(--text); font-size: 15px; font-family: var(--font);
    outline: none;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus { border-color: rgba(124,158,245,0.4); }
  .search-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 17px;
    display: flex; align-items: center;
  }

  /* ── Tab bar ── */
  .tabs { display: flex; gap: 6px; padding: 12px 18px 0; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 8px 14px; font-size: 13px; font-weight: 500; font-family: var(--font);
    border-radius: 8px 8px 0 0; cursor: pointer;
    color: var(--text-muted); background: none; border: none;
    border-bottom: 2px solid transparent; transition: color .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Main ── */
  main { padding: 16px 18px 100px; }

  /* ── Video player ── */
  .player-wrap {
    display: none; margin-bottom: 18px;
    background: #000; border-radius: var(--radius); overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .player-wrap.visible { display: block; }
  .player-wrap iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
  .player-info { padding: 12px 14px; background: var(--surface); }
  .player-title { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 4px; }
  .player-channel { font-size: 12px; color: var(--text-muted); }
  .btn-close-player {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 8px; margin-top: 8px;
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); font-size: 12px; font-family: var(--font); cursor: pointer;
  }

  /* ── Channel chips ── */
  .channel-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
  .channel-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px;
    font-family: var(--font); font-weight: 400; cursor: pointer;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
    transition: all .2s;
  }
  .chip.active { background: var(--accent-dim); border-color: rgba(124,158,245,0.4); color: var(--accent); font-weight: 500; }

  /* ── Video grid ── */
  .section-label { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 12px; }
  .video-list { display: flex; flex-direction: column; gap: 12px; }
  .video-card {
    display: flex; gap: 12px; cursor: pointer;
    background: var(--surface); border-radius: var(--radius);
    padding: 10px; border: 1px solid var(--border);
    transition: background .15s;
  }
  .video-card:active { background: var(--surface2); }
  .thumb-wrap { position: relative; flex-shrink: 0; width: 120px; height: 68px; border-radius: 8px; overflow: hidden; background: #000; }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-duration {
    position: absolute; bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.8); color: #fff; font-size: 10px;
    padding: 1px 5px; border-radius: 4px;
  }
  .video-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
  .video-title { font-size: 13px; font-weight: 500; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
  .video-channel { font-size: 11px; color: var(--text-muted); }
  .video-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── Empty / Loading ── */
  .state-msg { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; line-height: 1.8; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal: 채널 관리 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 100%; background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 18px 36px;
    max-height: 85dvh; display: flex; flex-direction: column;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-scroll { overflow-y: auto; flex: 1; }

  /* 채널 추가 폼 */
  .add-form { display: flex; gap: 8px; margin-bottom: 18px; }
  .add-form input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
    color: var(--text); font-size: 14px; font-family: var(--font); outline: none;
  }
  .add-form input:focus { border-color: rgba(124,158,245,0.4); }
  .btn-add {
    background: var(--accent); color: #0f1117; font-family: var(--font);
    font-size: 14px; font-weight: 700; border: none; border-radius: 10px;
    padding: 10px 16px; cursor: pointer; flex-shrink: 0;
  }

  /* 채널 리스트 */
  .channel-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .ch-thumb { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-id { font-size: 11px; color: var(--text-muted); }
  .btn-del {
    background: none; border: 1px solid rgba(224,92,92,0.3);
    color: var(--danger); font-size: 12px; font-family: var(--font);
    padding: 5px 10px; border-radius: 8px; cursor: pointer; flex-shrink: 0;
  }

  /* 도움말 */
  .help-text { font-size: 11px; color: var(--text-muted); line-height: 1.7; margin-bottom: 16px; background: var(--bg); border-radius: 10px; padding: 10px 12px; }

  /* keyword filter badge */
  .kw-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent-dim); color: var(--accent);
    border-radius: 6px; font-size: 12px; padding: 3px 8px; margin: 4px 4px 4px 0;
  }
  .kw-badge button { background: none; border: none; color: var(--accent); font-size: 14px; cursor: pointer; line-height: 1; padding: 0 0 0 2px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">말씀<span>듣기</span></div>
    <button class="btn-manage" onclick="openModal()">채널 관리</button>
  </div>
  <div class="search-wrap">
    <input type="search" id="searchInput" placeholder="설교 제목, 채널명 검색…" inputmode="search" enterkeyhint="search">
    <button class="search-btn" onclick="doSearch()">🔍</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('feed',this)">최신 설교</button>
  <button class="tab" onclick="switchTab('search',this)">검색 결과</button>
</div>

<main>
  <!-- Player -->
  <div class="player-wrap" id="playerWrap">
    <iframe id="ytPlayer" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    <div class="player-info">
      <div class="player-title" id="playerTitle"></div>
      <div class="player-channel" id="playerChannel"></div>
    </div>
    <button class="btn-close-player" onclick="closePlayer()">✕ 닫기</button>
  </div>

  <!-- Feed tab -->
  <div id="tabFeed">
    <div class="channel-chips" id="chipRow"></div>
    <div class="section-label" id="feedLabel">최신 영상</div>
    <div id="feedList" class="video-list">
      <div class="state-msg"><div class="spinner"></div>채널을 추가하면 최신 설교가 여기에 나타납니다.</div>
    </div>
  </div>

  <!-- Search tab -->
  <div id="tabSearch" style="display:none;">
    <div class="section-label">검색 결과</div>
    <div id="searchList" class="video-list">
      <div class="state-msg">위 검색창에서 설교를 찾아보세요.</div>
    </div>
  </div>
</main>

<!-- 채널 관리 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">설교 채널 관리</div>
    <div class="modal-scroll">
      <div class="help-text">
        📌 YouTube 채널 ID 또는 핸들(@이름)을 입력하세요.<br>
        예) <strong>@YoungSunBark</strong> · <strong>UCxxxxxx</strong>
      </div>
      <div class="add-form">
        <input type="text" id="chInput" placeholder="채널 ID 또는 @핸들" autocorrect="off" autocapitalize="off">
        <button class="btn-add" onclick="addChannel()">추가</button>
      </div>
      <div id="channelList"></div>
    </div>
  </div>
</div>

<script>
// ── YouTube Data API Key ──────────────────────────────────────────────────────
// ⚠️ 아래에 본인의 YouTube Data API v3 키를 넣어주세요.
// Google Cloud Console > API & Services > YouTube Data API v3
const API_KEY = 'AIzaSyDKG8z1sHn_uPBIDG8x5fU0S29w3lxrSO0';

// ── 기본 설교 채널 목록 (채널ID: 표시이름) ────────────────────────────────────
const DEFAULT_CHANNELS = [
  { id: 'UC5iqPeD5hbm1THv9cjOUv5A', name: '박영선 목사 (남포교회)' },
  { id: 'UCMzM9HKFKMlFQWa22176Bpg', name: '이재철 목사' },
  { id: 'UCiuA7KpPaadGi3tQ8TuZ3Zg', name: '김형국 목사 (나들목)' },
];

// ── State ─────────────────────────────────────────────────────────────────────
let channels = [];          // {id, name, thumb}[]
let activeChip = 'all';
let feedCache = {};         // channelId → videos[]
let currentTab = 'feed';

// ── Storage ───────────────────────────────────────────────────────────────────
function saveChannels() { localStorage.setItem('sermon_channels', JSON.stringify(channels)); }
function loadChannels() {
  const raw = localStorage.getItem('sermon_channels');
  if (raw) { channels = JSON.parse(raw); }
  else { channels = DEFAULT_CHANNELS.map(c => ({...c, thumb: ''})); saveChannels(); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadChannels();
renderChannelList();
buildChips();
loadFeed('all');

// 검색창 Enter
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ── Tab ───────────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabFeed').style.display = tab === 'feed' ? '' : 'none';
  document.getElementById('tabSearch').style.display = tab === 'search' ? '' : 'none';
}

// ── Channel chips ─────────────────────────────────────────────────────────────
function buildChips() {
  const row = document.getElementById('chipRow');
  row.innerHTML = '';
  const all = chip('전체', 'all');
  row.appendChild(all);
  channels.forEach(ch => row.appendChild(chip(ch.name.split(' ')[0], ch.id)));
}

function chip(label, id) {
  const btn = document.createElement('button');
  btn.className = 'chip' + (activeChip === id ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => { activeChip = id; buildChips(); loadFeed(id); };
  return btn;
}

// ── Feed ──────────────────────────────────────────────────────────────────────
async function loadFeed(chipId) {
  const label = document.getElementById('feedLabel');
  const list = document.getElementById('feedList');
  list.innerHTML = '<div class="state-msg"><div class="spinner"></div>불러오는 중…</div>';

  if (channels.length === 0) {
    list.innerHTML = '<div class="state-msg">채널을 추가하면 최신 설교가 여기에 나타납니다.</div>';
    return;
  }
  if (false) {
    list.innerHTML = demoCards();
    return;
  }

  const targets = chipId === 'all' ? channels : channels.filter(c => c.id === chipId);
  label.textContent = chipId === 'all' ? '최신 설교' : (channels.find(c=>c.id===chipId)?.name ?? '');

  let videos = [];
  for (const ch of targets) {
    if (feedCache[ch.id]) { videos.push(...feedCache[ch.id]); continue; }
    const v = await fetchLatest(ch.id, ch.name, 10);
    feedCache[ch.id] = v;
    videos.push(...v);
  }

  videos.sort((a,b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = '';
  if (!videos.length) { list.innerHTML = '<div class="state-msg">영상이 없습니다.</div>'; return; }
  videos.forEach(v => list.appendChild(videoCard(v)));
}

async function fetchLatest(channelId, channelName, maxResults=10) {
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=${maxResults}&order=date&type=video&key=${API_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    if (!d.items) return [];
    return d.items.map(item => ({
      id: item.id.videoId,
      title: item.snippet.title,
      channel: channelName,
      thumb: item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url,
      date: item.snippet.publishedAt,
    }));
  } catch(e) { return []; }
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  // 검색 탭으로 전환
  switchTab('search', document.querySelectorAll('.tab')[1]);

  const list = document.getElementById('searchList');
  list.innerHTML = '<div class="state-msg"><div class="spinner"></div>검색 중…</div>';

  if (false) {
    list.innerHTML = demoCards('검색: ' + q);
    return;
  }
  if (channels.length === 0) {
    list.innerHTML = '<div class="state-msg">채널을 먼저 추가해주세요.</div>';
    return;
  }

  let all = [];
  for (const ch of channels) {
    try {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${ch.id}&q=${encodeURIComponent(q)}&maxResults=5&type=video&key=${API_KEY}`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.items) {
        all.push(...d.items.map(item => ({
          id: item.id.videoId,
          title: item.snippet.title,
          channel: ch.name,
          thumb: item.snippet.thumbnails.medium?.url,
          date: item.snippet.publishedAt,
        })));
      }
    } catch(e) {}
  }

  all.sort((a,b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = '';
  if (!all.length) { list.innerHTML = '<div class="state-msg">"'+q+'" 검색 결과가 없습니다.</div>'; return; }
  all.forEach(v => list.appendChild(videoCard(v)));
}

// ── Video card ────────────────────────────────────────────────────────────────
function videoCard(v) {
  const card = document.createElement('div');
  card.className = 'video-card';
  card.innerHTML = `
    <div class="thumb-wrap">
      <img src="${v.thumb}" alt="" loading="lazy">
    </div>
    <div class="video-meta">
      <div class="video-title">${escHtml(v.title)}</div>
      <div class="video-channel">${escHtml(v.channel)}</div>
      <div class="video-date">${formatDate(v.date)}</div>
    </div>`;
  card.onclick = () => playVideo(v);
  return card;
}

// ── Player ────────────────────────────────────────────────────────────────────
function playVideo(v) {
  const wrap = document.getElementById('playerWrap');
  document.getElementById('ytPlayer').src = `https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&rel=0`;
  document.getElementById('playerTitle').textContent = v.title;
  document.getElementById('playerChannel').textContent = v.channel;
  wrap.classList.add('visible');
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function closePlayer() {
  document.getElementById('ytPlayer').src = '';
  document.getElementById('playerWrap').classList.remove('visible');
}

// ── Channel management modal ──────────────────────────────────────────────────
function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

async function addChannel() {
  const input = document.getElementById('chInput');
  let val = input.value.trim().replace(/^@/, '');
  if (!val) return;

  // @핸들인 경우 채널ID로 변환 (API로)
  let channelId = val;
  let channelName = val;

  if (true) {
    // 검색으로 채널 찾기
    try {
      const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(val)}&type=channel&maxResults=1&key=${API_KEY}`);
      const d = await r.json();
      if (d.items?.[0]) {
        channelId = d.items[0].id.channelId;
        channelName = d.items[0].snippet.title;
      }
    } catch(e) {}
  } else {
    // API 없는 경우 입력값 그대로 사용 안내
    channelName = '@' + val + ' (이름 미확인)';
  }

  if (channels.find(c => c.id === channelId)) {
    alert('이미 추가된 채널입니다.');
    return;
  }

  channels.push({ id: channelId, name: channelName, thumb: '' });
  saveChannels();
  input.value = '';
  renderChannelList();
  buildChips();
  feedCache = {};
  loadFeed(activeChip);
}

function removeChannel(id) {
  if (!confirm('이 채널을 삭제할까요?')) return;
  channels = channels.filter(c => c.id !== id);
  saveChannels();
  if (activeChip === id) { activeChip = 'all'; }
  renderChannelList();
  buildChips();
  feedCache = {};
  loadFeed(activeChip);
}

function renderChannelList() {
  const el = document.getElementById('channelList');
  if (!channels.length) {
    el.innerHTML = '<div class="state-msg" style="padding:20px 0">추가된 채널이 없습니다.</div>';
    return;
  }
  el.innerHTML = channels.map(ch => `
    <div class="channel-item">
      <img class="ch-thumb" src="${ch.thumb || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 36%22><rect width=%2236%22 height=%2236%22 fill=%22%23222636%22/><text x=%2218%22 y=%2224%22 text-anchor=%22middle%22 font-size=%2218%22>🎙</text></svg>'}" alt="">
      <div class="ch-info">
        <div class="ch-name">${escHtml(ch.name)}</div>
        <div class="ch-id">${ch.id}</div>
      </div>
      <button class="btn-del" onclick="removeChannel('${ch.id}')">삭제</button>
    </div>`).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
